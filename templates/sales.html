<!DOCTYPE html>
<html>
<head>
<title>Sales</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<div class="sidebar">
<div class="logo">Inventory</div>

<a href="/">Dashboard</a>
<a href="/products">Products</a>
<a href="/suppliers">Suppliers</a>
<a href="/purchase">Purchases</a>
<a href="/sales">Sales</a>
<a href="/warehouse">Warehouses</a>
<a href="/stock">Stock</a>
</div>

<div class="main">

<h1 class="page-title">Sales</h1>

<div class="section">

<h2>Add Sale</h2>

<form action="/add_sale" method="POST">

<select name="product_id" required>

<option value="">Select Product</option>

{% for p in products %}
<option value="{{ p[0] }}">
{{ p[1] }}
</option>
{% endfor %}

</select>

<input type="number"
name="quantity"
placeholder="Quantity"
required>

<input type="number"
step="0.01"
name="selling_price"
placeholder="Selling Price"
required>

<input type="date"
name="sales_date"
required>

<button>Add Sale</button>

</form>

</div>

<div class="section">

<h2>Sales History</h2>

<table>

<tr>
<th>ID</th>
<th>Product</th>
<th>Quantity</th>
<th>Selling Price</th>
<th>Date</th>
</tr>

{% for s in sales %}
<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>₹{{ s[3] }}</td>
<td>{{ s[4] }}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

</div>

</body>
</html>
